# Post-earnings Results Check
#
# Runs weekday evenings to catch beat/miss for names that reported today.
# Checks both today's events (BMO reported this morning, AMC just now) and
# yesterday's events (in case AMC actuals came in overnight).
#
# 22:37 UTC ≈ 5:37 PM ET (EST) / 6:37 PM ET (EDT). Picked to fall after
# most BMO/AMC reports are posted; off-peak minute to dodge top-of-hour skips.

name: Post-Earnings Results Check

on:
  schedule:
    - cron: "37 22 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to today."
        required: false
        type: string

# Serialize with daily_earnings_check and reconcile_calendar — all three
# read/write the earnings-db artifact.
concurrency:
  group: earnings-db-writer
  cancel-in-progress: false

jobs:
  check-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v4

      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v4
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # actions/download-artifact@v4 only sees artifacts from the same run,
      # which silently produced fresh-DB runs every time and erased locks,
      # Slack-reply state, unseen counters, kv_store, etc. Use a cross-run
      # downloader pinned to a commit SHA. Fail loudly post-bootstrap so
      # missing state is never silent.
      - name: Restore earnings database
        id: restore_db
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          name: earnings-db
          # search_artifacts: enumerate runs and find the most recent one
          # that ACTUALLY has the named artifact (default would pick the
          # latest successful run regardless of artifact presence and
          # fail when e.g. the watchdog workflow ran most recently
          # without uploading earnings-db).
          search_artifacts: true
          workflow_search: true
          workflow_conclusion: success
          # Scope to main so a feature-branch run never pollutes the
          # persistent SQLite artifact for the production pipeline.
          branch: main
          if_no_artifact_found: warn
          path: .

      - name: Abort if DB artifact missing post-bootstrap
        if: vars.EA_DB_BOOTSTRAPPED == 'true' && hashFiles('earnings_events.db') == ''
        env:
          WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          WEBHOOK="${WEBHOOK_STATUS:-$WEBHOOK_EARNINGS}"
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *earnings-db artifact missing* — aborting fresh-DB run. Locks, Slack threads, unseen counters, kv_store would all be lost. <${RUN_URL}|run details>\"}" \
              "$WEBHOOK"
          fi
          exit 1

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
        continue-on-error: true  # calendar updates are best-effort

      # Ensure the events table has entries with estimates for today's date
      # so check-results can compute beat/miss deltas against our consensus.
      - name: Populate events from Finnhub
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
        run: python main.py --populate-db-only --no-ticktick

      - name: Check today's results
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python main.py --check-results --date "${{ inputs.date }}"
          else
            python main.py --check-results
          fi

      # Also sweep yesterday to catch AMC reports whose actuals posted overnight.
      - name: Check yesterday's results (AMC overnight catch-up)
        if: inputs.date == ''
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
          python main.py --check-results --date "$YESTERDAY"

      # EDGAR backstop: after the Finnhub sweeps, flag any Tier 1/2 name that
      # filed an 8-K Item 2.02 (i.e. reported) but for which Finnhub still has
      # no actuals — the FIVE-class silent miss. Alert-only, dedup'd per
      # ticker+quarter. This IS the never-miss layer, so a failure must be
      # loud: `_run_safeguard` posts a degraded-health alert to #status-reports
      # and re-raises (NOT continue-on-error).
      - name: EDGAR missed-results backstop
        if: inputs.date == ''
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        run: python main.py --check-missed-results --no-heartbeat

      # Only main-branch runs upload — otherwise a feature-branch test
      # could leave a tainted artifact for the next mainline restore.
      - name: Save earnings database
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: earnings-db
          path: earnings_events.db
          retention-days: 90
          overwrite: true

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Post-Earnings Results Check* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
