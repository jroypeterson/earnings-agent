# Run the test suite on every push/PR. No secrets needed — every test stubs
# its I/O (calendar, Slack, Finnhub/FMP, yfinance, EDGAR), so this is a pure,
# fast guardrail for the date-correctness + merge + run() branch logic.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
