# .github/workflows/daily_earnings_check.yml
#
# Runs the earnings agent once daily at 11:00 UTC:
#   - 6:00 AM ET during EST (November-March)
#   - 7:00 AM ET during EDT (March-November)
# Also supports manual triggers from the GitHub Actions UI.

name: Daily Earnings Check

on:
  schedule:
    # 11:13 UTC ≈ 6 AM EST / 7 AM EDT  (morning full sync)
    # Off-peak minute deliberately — top-of-hour crons get delayed/skipped
    # under GitHub Actions load.
    - cron: "13 11 * * *"
    # 19:23 UTC ≈ 2 PM EST / 3 PM EDT  (weekday afternoon redundancy).
    # Catches new events and date moves Finnhub published mid-day, before
    # the 22:00 post-earnings-check run.
    - cron: "23 19 * * 1-5"
  workflow_dispatch: # Manual trigger

# Serialize with reconcile_calendar and post_earnings_check — all three
# read/write the earnings-db artifact.
concurrency:
  group: earnings-db-writer
  cancel-in-progress: false

jobs:
  check-earnings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v4

      # Coverage Manager is public — clone its exports so the agent gets
      # tier and sector data instead of falling back to legacy mode.
      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v4
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # actions/download-artifact@v4 only sees artifacts from the same run,
      # which silently produced fresh-DB runs every time and erased locks,
      # Slack-reply state, unseen counters, kv_store, etc. Use a cross-run
      # downloader pinned to a commit SHA. Fail loudly post-bootstrap so
      # missing state is never silent.
      - name: Restore earnings database
        id: restore_db
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          name: earnings-db
          # search_artifacts: enumerate runs and find the most recent one
          # that ACTUALLY has the named artifact (default behavior would
          # pick the latest successful run regardless of artifact presence
          # and fail when e.g. the watchdog workflow ran most recently
          # without uploading earnings-db).
          search_artifacts: true
          workflow_search: true
          workflow_conclusion: success
          # Scope to main so a feature-branch run never pollutes the
          # persistent SQLite artifact for the production pipeline.
          branch: main
          if_no_artifact_found: warn
          path: .

      - name: Abort if DB artifact missing post-bootstrap
        if: vars.EA_DB_BOOTSTRAPPED == 'true' && hashFiles('earnings_events.db') == ''
        env:
          WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          WEBHOOK="${WEBHOOK_STATUS:-$WEBHOOK_EARNINGS}"
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *earnings-db artifact missing* — aborting fresh-DB run. Locks, Slack threads, unseen counters, kv_store would all be lost. <${RUN_URL}|run details>\"}" \
              "$WEBHOOK"
          fi
          exit 1

      # Write the Google service account credentials from a GitHub secret
      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run earnings agent
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          TICKERS: ${{ vars.TICKERS }}  # Legacy fallback
        run: python main.py

      # Description drift: the daily sync's existing-event fast path
      # only triggers calendar updates on date or hour changes, so
      # description-only changes (e.g., newly-populated call_datetime_utc
      # via yfinance Ticker.info) won't propagate without this step.
      # Idempotent — no-op when descriptions already match.
      - name: Refresh calendar descriptions
        continue-on-error: true
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --refresh-descriptions

      # yfinance cross-check. Alert-only: Finnhub has already been applied
      # above; this surfaces two-source disagreements to prompt IR
      # verification. yfinance is scrapy, so do not fail the workflow if
      # it misbehaves.
      - name: Cross-check Finnhub vs yfinance (Tier 1/2)
        continue-on-error: true
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          # Calendar credentials needed for EDGAR auto-correction:
          # when SEC contradicts the stored date, the agent moves the
          # calendar event in addition to updating DB.
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --cross-check

      # Scan Gmail for IR-alert pre-announcements and auto-confirm
      # estimated Tier 1/2 events. Materializes the GMAIL_TOKEN_JSON +
      # GMAIL_CLIENT_CREDENTIALS_JSON secrets to disk so gmail_client
      # picks them up via its default file paths. No-ops cleanly when
      # secrets aren't set (gmail_client raises GmailError, caught and
      # logged at INFO). Never fails the workflow.
      - name: Check IR-alert emails
        continue-on-error: true
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CLIENT_CREDENTIALS_JSON: ${{ secrets.GMAIL_CLIENT_CREDENTIALS_JSON }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
        run: |
          if [ -z "$GMAIL_TOKEN_JSON" ]; then
            echo "GMAIL_TOKEN_JSON secret not set — skipping IR-email scan"
            exit 0
          fi
          printf '%s' "$GMAIL_TOKEN_JSON" > gmail_token.json
          printf '%s' "$GMAIL_CLIENT_CREDENTIALS_JSON" > gmail_client_credentials.json
          python main.py --check-ir-emails
          # Wipe the credentials from the runner FS — the artifact
          # upload step later only includes earnings_events.db, but
          # explicit cleanup avoids any future regression.
          rm -f gmail_token.json gmail_client_credentials.json

      # Poll Slack threads for replies on open questions and apply any
      # commands to DB state. No-op when SLACK_BOT_TOKEN/SLACK_CHANNEL_ID
      # are unset.
      - name: Check Slack replies on open questions
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --check-replies

      # Persist the SQLite DB for next run. Only main-branch runs upload —
      # otherwise a feature-branch test could leave a tainted artifact for
      # the next mainline restore to pick up.
      - name: Save earnings database
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: earnings-db
          path: earnings_events.db
          retention-days: 90
          overwrite: true

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Daily Earnings Check* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
