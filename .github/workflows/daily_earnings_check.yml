# .github/workflows/daily_earnings_check.yml
#
# Runs the earnings agent once daily at 11:00 UTC:
#   - 6:00 AM ET during EST (November-March)
#   - 7:00 AM ET during EDT (March-November)
# Also supports manual triggers from the GitHub Actions UI.

name: Daily Earnings Check

on:
  schedule:
    # 11:13 UTC ≈ 6 AM EST / 7 AM EDT  (morning full sync)
    # Off-peak minute deliberately — top-of-hour crons get delayed/skipped
    # under GitHub Actions load.
    - cron: "13 11 * * *"
    # 19:23 UTC ≈ 2 PM EST / 3 PM EDT  (weekday afternoon redundancy).
    # Catches new events and date moves Finnhub published mid-day, before
    # the 22:00 post-earnings-check run.
    - cron: "23 19 * * 1-5"
  workflow_dispatch: # Manual trigger

# Serialize with reconcile_calendar and post_earnings_check — all three
# read/write the earnings-db artifact.
concurrency:
  group: earnings-db-writer
  cancel-in-progress: false

# contents:write needed for the exports/upcoming_events.json commit-back
# step (publishes the calendar JSON for sa-monitor Phase 2 enrichment).
permissions:
  contents: write

jobs:
  check-earnings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v5

      # Coverage Manager is public — clone its exports so the agent gets
      # tier and sector data instead of falling back to legacy mode.
      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v5
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # actions/download-artifact@v4 only sees artifacts from the same run,
      # which silently produced fresh-DB runs every time and erased locks,
      # Slack-reply state, unseen counters, kv_store, etc. Use a cross-run
      # downloader pinned to a commit SHA. Fail loudly post-bootstrap so
      # missing state is never silent.
      - name: Restore earnings database
        id: restore_db
        # continue-on-error: a transient GitHub-API error while enumerating
        # cross-run artifacts (the action prints an HTML error page and exits
        # non-zero) must not blank a run. Retried below; the abort-if-missing
        # step still guards a genuinely-absent DB. (post-earnings hit this
        # 2026-07-16 and went dark for a night — hardened fleet-wide.)
        continue-on-error: true
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          name: earnings-db
          # search_artifacts: enumerate runs and find the most recent one
          # that ACTUALLY has the named artifact (default behavior would
          # pick the latest successful run regardless of artifact presence
          # and fail when e.g. the watchdog workflow ran most recently
          # without uploading earnings-db).
          search_artifacts: true
          workflow_search: true
          workflow_conclusion: success
          # Scope to main so a feature-branch run never pollutes the
          # persistent SQLite artifact for the production pipeline.
          branch: main
          if_no_artifact_found: warn
          path: .

      # Retry once on a transient downloader/API error. if_no_artifact_found=warn
      # means a genuinely-missing artifact exits 0 (outcome=success), so this only
      # re-fires on a real error — never on the legitimate bootstrap/no-artifact case.
      # NOT continue-on-error: a persistent API outage should fail loud (Slack + email).
      - name: Restore earnings database (retry after transient error)
        id: restore_db_retry
        if: steps.restore_db.outcome == 'failure'
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          name: earnings-db
          search_artifacts: true
          workflow_search: true
          workflow_conclusion: success
          branch: main
          if_no_artifact_found: warn
          path: .

      - name: Abort if DB artifact missing post-bootstrap
        if: vars.EA_DB_BOOTSTRAPPED == 'true' && hashFiles('earnings_events.db') == ''
        env:
          WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          WEBHOOK="${WEBHOOK_STATUS:-$WEBHOOK_EARNINGS}"
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *earnings-db artifact missing* — aborting fresh-DB run. Locks, Slack threads, unseen counters, kv_store would all be lost. <${RUN_URL}|run details>\"}" \
              "$WEBHOOK"
          fi
          exit 1

      # Write the Google service account credentials from a GitHub secret
      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run earnings agent
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          TICKERS: ${{ vars.TICKERS }}  # Legacy fallback
        run: python main.py

      # Description drift: the daily sync's existing-event fast path
      # only triggers calendar updates on date or hour changes, so
      # description-only changes (e.g., newly-populated call_datetime_utc
      # via yfinance Ticker.info) won't propagate without this step.
      # Idempotent — no-op when descriptions already match.
      - name: Refresh calendar descriptions
        continue-on-error: true
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --refresh-descriptions

      # yfinance cross-check. Alert-only: Finnhub has already been applied
      # above; this surfaces two-source disagreements to prompt IR
      # verification. Per-ticker yfinance flakiness is swallowed inside the
      # script (yf_missing counter), so only a SYSTEMIC failure crashes here —
      # and that must be loud, not silent (it's the date-correctness layer).
      # `_run_safeguard` posts a degraded-health alert to #status-reports and
      # re-raises, so this step is intentionally NOT continue-on-error.
      - name: Cross-check Finnhub vs yfinance (Tier 1/2)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          # Calendar credentials needed for EDGAR auto-correction:
          # when SEC contradicts the stored date, the agent moves the
          # calendar event in addition to updating DB.
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          # Web-search resolver (web_resolver.py): finds the company's own
          # announced date and auto-locks high-confidence matches before
          # asking the operator. Unset -> resolver skipped, old behavior.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --cross-check

      # Scan Gmail for IR-alert pre-announcements and auto-confirm
      # estimated Tier 1/2 events. Materializes the GMAIL_TOKEN_JSON +
      # GMAIL_CLIENT_CREDENTIALS_JSON secrets to disk so gmail_client
      # picks them up via its default file paths. No-ops cleanly when
      # secrets aren't set (gmail_client raises GmailError, caught and
      # logged at INFO). Never fails the workflow.
      - name: Check IR-alert emails
        continue-on-error: true
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CLIENT_CREDENTIALS_JSON: ${{ secrets.GMAIL_CLIENT_CREDENTIALS_JSON }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
        run: |
          if [ -z "$GMAIL_TOKEN_JSON" ]; then
            echo "GMAIL_TOKEN_JSON secret not set — skipping IR-email scan"
            exit 0
          fi
          printf '%s' "$GMAIL_TOKEN_JSON" > gmail_token.json
          printf '%s' "$GMAIL_CLIENT_CREDENTIALS_JSON" > gmail_client_credentials.json
          python main.py --check-ir-emails
          # Wipe the credentials from the runner FS — the artifact
          # upload step later only includes earnings_events.db, but
          # explicit cleanup avoids any future regression.
          rm -f gmail_token.json gmail_client_credentials.json

      # Poll Slack threads for replies on open questions and apply any
      # commands to DB state. No-op when SLACK_BOT_TOKEN/SLACK_CHANNEL_ID
      # are unset. Slack replies drive manual locks/corrections, so failures
      # must be loud: --check-replies is wrapped in _run_safeguard (posts a
      # degraded-health alert + re-raises), hence NOT continue-on-error.
      - name: Check Slack replies on open questions
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --check-replies

      # Reconcile TickTick tasks against DB truth: fix stale dates, mark
      # reported names [REPORTED], backfill lost task pointers. The create-only
      # sync above never edits an existing task, so a name whose projected date
      # was wrong (or whose pointer was lost on a date move) drifts and its task
      # sits open + stale forever (the UNH 2Q26 failure). Self-healing projection
      # of DB state with a built-in staleness guard (refuses on a stale DB).
      # Best-effort (TickTick hygiene, not a date-safeguard) so it can never fail
      # the critical sync.
      #
      # FIRST-DEPLOY: --dry-run so the bulk repair (a full quarter of unmarked
      # tasks) is LOGGED for review before it writes. Remove --dry-run to enable
      # writes once the first CI log has been eyeballed.
      - name: Reconcile TickTick tasks (dry-run)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
        run: python main.py --reconcile-ticktick --dry-run

      # Pre-earnings Consensus Metrics Preview (StreetAccount §9A) for upcoming
      # Tier-1 reporters -> #street-account + exports/consensus_preview.json
      # (hand-off for sa-monitor). A FEATURE, not a safeguard: continue-on-error
      # so a preview failure can NEVER fail the critical daily sync. Until the
      # SLACK_WEBHOOK_STREET_ACCOUNT secret is added it raises (swallowed here)
      # and posts nothing, but still writes the JSON export. Runs before the DB
      # save so its kv_store dedup marks persist.
      - name: Consensus metrics preview (StreetAccount §9A)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_STREET_ACCOUNT: ${{ secrets.SLACK_WEBHOOK_STREET_ACCOUNT }}
        run: python main.py --consensus-preview

      # Publish exports/upcoming_events.json for downstream consumers
      # (sa-monitor Phase 2 'Note:' context enrichment fetches this via
      # raw.githubusercontent.com). Commit-back so the file is reachable
      # from a public URL without needing GH artifact auth.
      - name: Export upcoming events JSON
        if: github.ref == 'refs/heads/main'
        run: python scripts/export_upcoming_events.py

      # Rebuild the public earnings-calendar page (docs/index.html, served by
      # GitHub Pages from the docs/ folder on main -- the daily-reads pattern).
      # Regenerated from the DB every run so past/upcoming stay current; it is a
      # read-only consumer of earnings_events.db.
      - name: Build earnings calendar Pages site
        if: github.ref == 'refs/heads/main'
        run: python scripts/build_calendar_page.py

      - name: Commit exports + Pages site if changed
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          git config user.name "earnings-agent-ci"
          git config user.email "earnings-agent-ci@users.noreply.github.com"
          git add exports/upcoming_events.json
          [ -f exports/consensus_preview.json ] && git add exports/consensus_preview.json || true
          [ -f docs/index.html ] && git add docs/index.html docs/.nojekyll || true
          if git diff --cached --quiet; then
            echo "no changes to exported JSON or Pages site"
            exit 0
          fi
          # Commit FIRST, then rebase onto the moved remote, then push — the
          # sigma-alert-proven race guard. (The old order ran pull --rebase with
          # a STAGED index, which errors unconditionally and was swallowed by
          # '|| true', so on a remote race the commit-back was silently lost.)
          git commit -m "ci: refresh exports/*.json + docs/index.html (earnings calendar page)"
          git pull --rebase --quiet origin "${GITHUB_REF_NAME:-main}" || {
            git rebase --abort || true
            echo "::error::rebase onto origin failed - export commit-back NOT pushed"
            exit 1
          }
          git push "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME:-main}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist the SQLite DB for next run. Only main-branch runs upload —
      # otherwise a feature-branch test could leave a tainted artifact for
      # the next mainline restore to pick up.
      - name: Save earnings database
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: earnings-db
          path: earnings_events.db
          retention-days: 90
          overwrite: true

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Daily Earnings Check* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      # Out-of-band backup: also email, in case Slack itself is the failure.
      # Inline (runner python3 + stdlib) so it does NOT depend on the repo
      # checkout — the backup must work even if checkout is what failed.
      - name: Email backup on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: jroypeterson+alerts@gmail.com
          ALERT_SUBJECT: "[ClaudeFin] earnings_agent — Daily Earnings Check failed"
          ALERT_BODY: "The Daily Earnings Check workflow failed (Slack alerting may be down). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python3 - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS", "").strip()
          pw = os.environ.get("GMAIL_APP_PASSWORD", "").strip()
          to = os.environ.get("ALERT_EMAIL_TO", "jroypeterson+alerts@gmail.com").strip()
          if not addr or not pw:
              print("email backup: GMAIL creds unset - skipping"); raise SystemExit(0)
          msg = MIMEText(os.environ.get("ALERT_BODY", "") or os.environ.get("ALERT_SUBJECT", ""), "plain")
          msg["Subject"] = os.environ.get("ALERT_SUBJECT", "[ClaudeFin] earnings_agent — alert")
          msg["From"] = addr; msg["To"] = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
              s.login(addr, pw); s.send_message(msg)
          print(f"email backup: sent to {to}")
          PY

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
