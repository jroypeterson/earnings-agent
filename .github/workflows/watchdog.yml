# .github/workflows/watchdog.yml
#
# Detects stale sibling workflows and recovers them.
#
# GitHub Actions can silently skip scheduled crons under load — workflows
# stay "active" but never fire. This watchdog runs three times a day at
# off-peak minutes, checks the last successful run for each operational
# workflow, and:
#
#   1. Posts a Slack alert to #status-reports listing what's stale.
#   2. Auto-dispatches a fresh run for each stale workflow as a backup.
#
# Thresholds account for weekend gaps (reconcile/post-earnings only run
# weekdays). When a workflow is genuinely overdue, the watchdog dispatches
# it via gh CLI; the recovered run then updates the last-success timestamp,
# so subsequent watchdog ticks see fresh state and don't loop.

name: Workflow Watchdog

on:
  schedule:
    # Three checks per day, off-peak minutes.
    - cron: "37 13,17,21 * * *"
  workflow_dispatch:

permissions:
  actions: write   # required for `gh workflow run` to dispatch sibling workflows
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check freshness, alert, and auto-dispatch recovery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: jroypeterson+alerts@gmail.com
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          WEBHOOK="${SLACK_WEBHOOK_STATUS:-$SLACK_WEBHOOK_EARNINGS}"
          NOW_EPOCH=$(date +%s)

          # SCHEDULE-AWARE staleness: instead of a flat "last success < N hours"
          # (which can't tell a skipped Friday weekday run from a normal weekend
          # gap, so a Fri-evening miss wouldn't alert until Mon), we compute the
          # most-recent EXPECTED trigger for each workflow's cadence and alert
          # when no success has landed since it (plus a grace window). This
          # guarantees a within-~24h alert for any skipped weekday run while
          # never false-alarming on weekends.
          #
          # most_recent_trigger(schedule, hourUTC): the latest scheduled trigger
          # at or before now, respecting the cadence's allowed days.
          most_recent_trigger() {
            local sched="$1" hh="$2" cand dow i
            cand=$(date -u -d "$(date -u +%F) ${hh}:00:00" +%s)
            [ "$NOW_EPOCH" -lt "$cand" ] && cand=$((cand - 86400))
            for i in $(seq 0 7); do
              dow=$(date -u -d "@$cand" +%u)   # 1=Mon .. 7=Sun
              case "$sched" in
                daily)   break ;;
                weekday) [ "$dow" -le 5 ] && break ;;
                sun)     [ "$dow" -eq 7 ] && break ;;
              esac
              cand=$((cand - 86400))
            done
            echo "$cand"
          }

          # label | workflow_file | schedule | latest_trigger_hour_UTC | grace_hours | recent_failure_window_hours
          #   schedule/hour: the cadence + the LATEST daily trigger hour (UTC).
          #   grace_hours: time allowed after the trigger for the run to land
          #     (cron delay + runtime + watchdog cadence) before we call it stale.
          #   recent_failure_window_hours: if a failure is newer than the last
          #     success and within this window, the workflow is broken (not
          #     skipped) — don't auto-dispatch; let its own failure alert triage.
          # The daily workflow fires twice: 11:13 UTC (every day) and 19:23 UTC
          # (weekday afternoon redundancy). Model BOTH so a skipped PM run is
          # caught even when the morning run succeeded. The PM entry is checked
          # at the 21:37 watchdog tick (after the 19:23 trigger, before the next
          # morning's success would mask it); grace=2 keeps it loop-safe
          # (a dispatched recovery's success clears it via since-trigger).
          WORKFLOWS=(
            "Daily Earnings Check (AM)|daily_earnings_check.yml|daily|11|6|24"
            "Daily Earnings Check (PM)|daily_earnings_check.yml|weekday|19|2|24"
            "Reconcile Calendar|reconcile_calendar.yml|weekday|20|6|24"
            "Post-Earnings Results Check|post_earnings_check.yml|weekday|22|5|24"
            "Weekly Earnings Digest|weekly_digest.yml|sun|16|24|168"
          )

          stale_lines=()
          for entry in "${WORKFLOWS[@]}"; do
            IFS='|' read -r label file sched hh grace_h fail_window <<< "$entry"

            last=$(gh run list -R "$REPO" -w "$file" -s success -L 1 --json createdAt --jq '.[0].createdAt // ""')
            last_failure=$(gh run list -R "$REPO" -w "$file" -s failure -L 1 --json createdAt --jq '.[0].createdAt // ""')

            if [ -z "$last" ]; then
              age_str="never"
              last_epoch=0
            else
              last_epoch=$(date -d "$last" +%s)
              age_h=$(( (NOW_EPOCH - last_epoch) / 3600 ))
              age_str="${age_h}h ago (${last})"
            fi

            expected=$(most_recent_trigger "$sched" "$hh")
            grace_epoch=$(( expected + grace_h * 3600 ))
            exp_str=$(date -u -d "@$expected" +'%Y-%m-%dT%H:%MZ')

            # Detect "broken, not skipped": failure newer than last success
            # AND within the per-workflow recent-failure window.
            broken=false
            if [ -n "$last_failure" ]; then
              fail_epoch=$(date -d "$last_failure" +%s)
              if [ "$fail_epoch" -gt "$last_epoch" ]; then
                fail_age_h=$(( (NOW_EPOCH - fail_epoch) / 3600 ))
                if [ "$fail_age_h" -lt "$fail_window" ]; then
                  broken=true
                  broken_str="last failure ${fail_age_h}h ago"
                fi
              fi
            fi

            # Stale = the most-recent expected run is past its grace window and
            # no success has landed since that trigger.
            if [ "$NOW_EPOCH" -ge "$grace_epoch" ] && [ "$last_epoch" -lt "$expected" ]; then
              echo "STALE: $label — no success since expected ${exp_str} run (+${grace_h}h grace); last success $age_str"
              if $broken; then
                echo "  -> $broken_str within ${fail_window}h window; NOT dispatching"
                stale_lines+=("• \`$label\` — no success since the expected ${exp_str} run (last: $age_str). :no_entry: ${broken_str}; not dispatching (workflow is broken, see its own failure alert).")
              elif gh workflow run "$file" -R "$REPO" --ref main; then
                stale_lines+=("• \`$label\` — no success since the expected ${exp_str} run (last: $age_str). :arrows_counterclockwise: Recovery dispatched.")
              else
                stale_lines+=("• \`$label\` — no success since the expected ${exp_str} run (last: $age_str). :warning: Recovery dispatch FAILED.")
              fi
            else
              echo "OK: $label — last success $age_str (expected by ${exp_str}+${grace_h}h)"
            fi
          done

          if [ ${#stale_lines[@]} -eq 0 ]; then
            echo "All watched workflows are fresh."
            exit 0
          fi

          # Build the alert body once (shared by Slack + the email backup).
          body_text=$(printf '%s\n' "${stale_lines[@]}")

          # Try Slack first (if configured). Track whether it actually delivered.
          slack_ok=false
          if [ -n "$WEBHOOK" ]; then
            payload=$(jq -nc \
              --arg header ":alarm_clock: *Workflow watchdog* — stale workflows detected" \
              --arg body "$body_text" \
              --arg footer "Watchdog run: $RUN_URL" \
              '{text: ($header + "\n" + $body + "\n" + $footer)}')
            if curl -sS -X POST -H 'Content-Type: application/json' \
                 --data "$payload" "$WEBHOOK" >/dev/null; then
              slack_ok=true
            else
              echo "Slack post of stale alert failed"
            fi
          else
            echo "No Slack webhook configured"
          fi

          # If Slack didn't deliver (UNSET or FAILED), email out-of-band so a
          # detected stale workflow is never silently dropped. The stale lines
          # are passed as one env var (STALE_BODY); the body is built in Python
          # (avoids a multi-line YAML literal). If email ALSO can't send (no
          # Gmail creds), exit non-zero so the run goes red — a stale workflow
          # must reach SOME channel.
          if ! $slack_ok; then
            echo "Emailing stale detail out-of-band (Slack unavailable/failed)"
            STALE_BODY="$body_text" python3 - <<'PY'
          import os, smtplib, sys
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS", "").strip()
          pw = os.environ.get("GMAIL_APP_PASSWORD", "").strip()
          to = os.environ.get("ALERT_EMAIL_TO", "jroypeterson+alerts@gmail.com").strip()
          if not addr or not pw:
              print("watchdog stale alert reached NO channel: Slack unavailable "
                    "and GMAIL creds unset"); sys.exit(1)
          body = ("The watchdog detected STALE workflow(s) and Slack was "
                  "unavailable or delivery failed.\n\nStale workflows:\n"
                  + os.environ.get("STALE_BODY", "")
                  + "\n\nWatchdog run: " + os.environ.get("RUN_URL", ""))
          msg = MIMEText(body, "plain")
          msg["Subject"] = "[ClaudeFin] earnings_agent — stale workflow(s) detected"
          msg["From"] = addr; msg["To"] = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
              s.login(addr, pw); s.send_message(msg)
          print(f"watchdog stale email: sent to {to}")
          PY
          fi

      - name: Notify Slack on watchdog failure
        if: failure()
        env:
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          WEBHOOK="${SLACK_WEBHOOK_STATUS:-$SLACK_WEBHOOK_EARNINGS}"
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Workflow Watchdog* itself failed — <${RUN_URL}|run details>. Sibling workflow staleness is no longer being checked.\"}" \
              "$WEBHOOK"
          fi

      # Out-of-band email backup for a watchdog CRASH (the watch step itself
      # erroring). Sent inline via the runner's python3 (stdlib smtplib) since
      # the watchdog has no repo checkout. NOTE: a stale-detected-but-Slack-down
      # case is handled inside the watch step (it catches the curl failure and
      # emails the stale lines there); this step is the crash backstop, plus
      # the case where the watch step exits non-zero because a stale alert
      # reached no channel at all.
      - name: Email backup on watchdog failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: jroypeterson+alerts@gmail.com
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS", "").strip()
          pw = os.environ.get("GMAIL_APP_PASSWORD", "").strip()
          to = os.environ.get("ALERT_EMAIL_TO", "jroypeterson+alerts@gmail.com").strip()
          if not addr or not pw:
              print("watchdog email backup: GMAIL creds unset — skipping"); raise SystemExit(0)
          body = ("Workflow Watchdog failed or could not deliver a staleness "
                  "alert (Slack may be down). Sibling-workflow monitoring is "
                  f"degraded. Run: {os.environ.get('RUN_URL','')}")
          msg = MIMEText(body, "plain")
          msg["Subject"] = "[ClaudeFin] earnings_agent — Workflow Watchdog failed"
          msg["From"] = addr; msg["To"] = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
              s.login(addr, pw); s.send_message(msg)
          print(f"watchdog email backup: sent to {to}")
          PY
