# .github/workflows/reconcile_calendar.yml
#
# Lightweight calendar drift reconcile. Runs every 3 hours during
# market hours on weekdays to catch Finnhub date changes between
# daily sync runs.
#
# Cron times in UTC:
#   14:00 UTC = 10 AM EDT / 9 AM EST
#   17:00 UTC = 1 PM EDT  / 12 PM EST
#   20:00 UTC = 4 PM EDT  / 3 PM EST
#
# Slack posts only when drift was detected and fixed (silent no-op
# otherwise), so running three times a day is safe.

name: Reconcile Calendar

on:
  schedule:
    - cron: "0 14,17,20 * * 1-5"
  workflow_dispatch:

# Shares the earnings-db artifact with daily_earnings_check and
# post_earnings_check. Serialize so two DB writers never race.
concurrency:
  group: earnings-db-writer
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v4

      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v4
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore earnings database
        uses: actions/download-artifact@v4
        with:
          name: earnings-db
          path: .
        continue-on-error: true

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run reconcile
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
        run: python main.py --reconcile-calendar

      - name: Save earnings database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: earnings-db
          path: earnings_events.db
          retention-days: 90
          overwrite: true

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Reconcile Calendar* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
