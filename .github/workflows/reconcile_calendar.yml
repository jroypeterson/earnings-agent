# .github/workflows/reconcile_calendar.yml
#
# Lightweight calendar drift reconcile. Runs every 3 hours during
# market hours on weekdays to catch Finnhub date changes between
# daily sync runs.
#
# Cron times in UTC (offset off :00 to avoid GitHub-wide top-of-hour skips):
#   14:09 UTC ≈ 10 AM EDT / 9 AM EST
#   17:09 UTC ≈ 1 PM EDT  / 12 PM EST
#   20:09 UTC ≈ 4 PM EDT  / 3 PM EST
#
# Slack posts only when drift was detected and fixed (silent no-op
# otherwise), so running three times a day is safe.

name: Reconcile Calendar

on:
  schedule:
    - cron: "9 14,17,20 * * 1-5"
  workflow_dispatch:

# Shares the earnings-db artifact with daily_earnings_check and
# post_earnings_check. Serialize so two DB writers never race.
concurrency:
  group: earnings-db-writer
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v5

      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v5
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # actions/download-artifact@v4 only sees artifacts from the same run,
      # which silently produced fresh-DB runs every time and erased locks,
      # Slack-reply state, unseen counters, kv_store, etc. Use a cross-run
      # downloader pinned to a commit SHA. Fail loudly post-bootstrap so
      # missing state is never silent.
      - name: Restore earnings database
        id: restore_db
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11  # v6
        with:
          name: earnings-db
          # search_artifacts: enumerate runs and find the most recent one
          # that ACTUALLY has the named artifact (default would pick the
          # latest successful run regardless of artifact presence and
          # fail when e.g. the watchdog workflow ran most recently
          # without uploading earnings-db).
          search_artifacts: true
          workflow_search: true
          workflow_conclusion: success
          # Scope to main so a feature-branch run never pollutes the
          # persistent SQLite artifact for the production pipeline.
          branch: main
          if_no_artifact_found: warn
          path: .

      - name: Abort if DB artifact missing post-bootstrap
        if: vars.EA_DB_BOOTSTRAPPED == 'true' && hashFiles('earnings_events.db') == ''
        env:
          WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          WEBHOOK="${WEBHOOK_STATUS:-$WEBHOOK_EARNINGS}"
          if [ -n "$WEBHOOK" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *earnings-db artifact missing* — aborting fresh-DB run. Locks, Slack threads, unseen counters, kv_store would all be lost. <${RUN_URL}|run details>\"}" \
              "$WEBHOOK"
          fi
          exit 1

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run reconcile
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          SLACK_WEBHOOK_STATUS: ${{ secrets.SLACK_WEBHOOK_STATUS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
        run: python main.py --reconcile-calendar

      # Poll Slack threads for replies on open questions and apply any
      # commands (lock/wait/snooze/ignore/etc) to DB state. No-op when
      # SLACK_BOT_TOKEN/SLACK_CHANNEL_ID are unset.
      - name: Check Slack replies on open questions
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_STATUS_CHANNEL_ID: ${{ secrets.SLACK_STATUS_CHANNEL_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python main.py --check-replies

      # Only main-branch runs upload — otherwise a feature-branch test
      # could leave a tainted artifact for the next mainline restore.
      - name: Save earnings database
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: earnings-db
          path: earnings_events.db
          retention-days: 90
          overwrite: true

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Reconcile Calendar* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      # Out-of-band backup: also email, in case Slack itself is the failure.
      # Inline (no repo-checkout dependency).
      - name: Email backup on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: jroypeterson+alerts@gmail.com
          ALERT_SUBJECT: "earnings_agent: Reconcile Calendar failed"
          ALERT_BODY: "The Reconcile Calendar workflow failed (drift-fix / reply alerting may be down). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python3 - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS", "").strip()
          pw = os.environ.get("GMAIL_APP_PASSWORD", "").strip()
          to = os.environ.get("ALERT_EMAIL_TO", "jroypeterson+alerts@gmail.com").strip()
          if not addr or not pw:
              print("email backup: GMAIL creds unset - skipping"); raise SystemExit(0)
          msg = MIMEText(os.environ.get("ALERT_BODY", "") or os.environ.get("ALERT_SUBJECT", ""), "plain")
          msg["Subject"] = os.environ.get("ALERT_SUBJECT", "earnings_agent alert")
          msg["From"] = addr; msg["To"] = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
              s.login(addr, pw); s.send_message(msg)
          print(f"email backup: sent to {to}")
          PY

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
