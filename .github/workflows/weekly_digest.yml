# Weekly Earnings Digest
#
# Runs every Sunday at ~12:43 PM ET (16:43 UTC in EST, 17:43 UTC in EDT).
# Off-peak minute deliberately — top-of-hour crons get delayed/skipped under
# GitHub Actions load.
#
# Posts the week-ahead digest to Slack. The email draft is produced locally
# via Gmail MCP; CI writes last_digest.html as an artifact for reference.

name: Weekly Earnings Digest

on:
  schedule:
    - cron: "43 16 * * 0"
  workflow_dispatch:

jobs:
  weekly-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout earnings-agent
        uses: actions/checkout@v5

      - name: Checkout Coverage Manager exports
        uses: actions/checkout@v5
        with:
          repository: jroypeterson/Coverage-Manager
          path: coverage-manager
          sparse-checkout: |
            exports
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Populate a fresh SQLite DB from Finnhub before the digest runs.
      # --populate-db-only seeds the events table (no Calendar/Slack writes),
      # --no-ticktick skips task creation — we only need events for the query.
      - name: Populate events from Finnhub
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
        run: python main.py --populate-db-only --no-ticktick

      - name: Run weekly digest
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          COVERAGE_MANAGER_PATH: ${{ github.workspace }}/coverage-manager
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
        run: python main.py --weekly-digest

      - name: Upload digest HTML artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: weekly-digest-html
          path: |
            last_digest.html
            last_digest.txt
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_EARNINGS: ${{ secrets.SLACK_WEBHOOK_EARNINGS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_EARNINGS" ]; then
            curl -sS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\":rotating_light: *Weekly Earnings Digest* failed — <${RUN_URL}|run details>\"}" \
              "$SLACK_WEBHOOK_EARNINGS"
          fi

      # Out-of-band backup: also email, in case Slack itself is the failure.
      # Inline (no repo-checkout dependency).
      - name: Email backup on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: jroypeterson+alerts@gmail.com
          ALERT_SUBJECT: "earnings_agent: Weekly Earnings Digest failed"
          ALERT_BODY: "The Weekly Earnings Digest workflow failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python3 - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS", "").strip()
          pw = os.environ.get("GMAIL_APP_PASSWORD", "").strip()
          to = os.environ.get("ALERT_EMAIL_TO", "jroypeterson+alerts@gmail.com").strip()
          if not addr or not pw:
              print("email backup: GMAIL creds unset - skipping"); raise SystemExit(0)
          msg = MIMEText(os.environ.get("ALERT_BODY", "") or os.environ.get("ALERT_SUBJECT", ""), "plain")
          msg["Subject"] = os.environ.get("ALERT_SUBJECT", "earnings_agent alert")
          msg["From"] = addr; msg["To"] = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
              s.login(addr, pw); s.send_message(msg)
          print(f"email backup: sent to {to}")
          PY
